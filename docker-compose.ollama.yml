services:
  api:
    environment:
      LLM_PROVIDER: openai_compatible
      LLM_BASE_URL: http://host.docker.internal:11434/v1
      LLM_API_KEY: ollama
      LLM_MODEL: ${LLM_MODEL:?Set LLM_MODEL to an installed Ollama Qwen3 tag}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-90}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_HISTORY_TURNS: ${LLM_HISTORY_TURNS:-8}
      LLM_HISTORY_MAX_CHARS: ${LLM_HISTORY_MAX_CHARS:-12000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
