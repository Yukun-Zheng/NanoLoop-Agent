name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  quality:
    name: Ruff, Mypy, and migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e '.[dev,frontend]'

      - name: Verify installed dependency compatibility
        run: python -m pip check

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy app frontend

      - name: Streamlit page smoke test
        run: python scripts/check_frontend.py

      - name: Verify checked-in OpenAPI
        run: |
          python scripts/generate_openapi.py
          git diff --exit-code -- docs/api/openapi-v1.json

      - name: Alembic round trip and drift check
        env:
          PYTHON_BIN: python
        run: ./scripts/check_migrations.sh

  tests:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e '.[dev,frontend]'

      - name: Run test suite
        env:
          APP_ENV: test
        run: python -m pytest -q

  container:
    name: CPU container smoke test
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build CPU API image
        run: docker build --tag nanoloop-agent:ci .

      - name: Build Streamlit frontend image
        run: docker build --file Dockerfile.frontend --tag nanoloop-agent-frontend:ci .

      - name: Start and verify non-root API container
        shell: bash
        run: |
          set -euo pipefail
          docker network create nanoloop-ci-network >/dev/null
          docker volume create nanoloop-ci-data >/dev/null
          docker volume create nanoloop-ci-outputs >/dev/null
          docker volume create nanoloop-ci-logs >/dev/null
          docker volume create nanoloop-ci-sources >/dev/null
          docker volume create nanoloop-ci-index >/dev/null
          docker run --detach --name nanoloop-api-ci \
            --network nanoloop-ci-network \
            --network-alias api \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --env NANOLOOP_API_KEY=ci_api_key_0123456789abcdef123456 \
            --env API_RATE_LIMIT_REQUESTS=20 \
            --env TRUSTED_HOSTS=localhost,127.0.0.1,api \
            --mount type=volume,src=nanoloop-ci-data,dst=/app/data \
            --mount type=volume,src=nanoloop-ci-outputs,dst=/app/outputs \
            --mount type=volume,src=nanoloop-ci-logs,dst=/app/logs \
            --mount type=volume,src=nanoloop-ci-sources,dst=/app/knowledge_base/sources \
            --mount type=volume,src=nanoloop-ci-index,dst=/app/knowledge_base/index \
            nanoloop-agent:ci >/dev/null
          for attempt in $(seq 1 40); do
            status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' \
              nanoloop-api-ci)
            if [ "${status}" = "healthy" ]; then
              docker exec nanoloop-api-ci python -c \
                "import os; assert os.getuid() != 0; assert os.access('/app/data/model-snapshots', os.W_OK)"
              docker exec nanoloop-api-ci python -c \
                "import json,urllib.request; r=urllib.request.Request('http://127.0.0.1:8000/api/v1/health',headers={'X-API-Key':'ci_api_key_0123456789abcdef123456'}); p=json.load(urllib.request.urlopen(r,timeout=3)); assert p['status']=='success'"
              exit 0
            fi
            if [ "${status}" = "unhealthy" ]; then
              break
            fi
            sleep 2
          done
          docker logs nanoloop-api-ci
          exit 1

      - name: Start and verify non-root Streamlit frontend container
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name nanoloop-frontend-ci \
            --network nanoloop-ci-network \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=128m \
            --env NANOLOOP_API_BASE_URL=http://api:8000 \
            --env NANOLOOP_API_KEY=ci_api_key_0123456789abcdef123456 \
            nanoloop-agent-frontend:ci >/dev/null
          for attempt in $(seq 1 40); do
            status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' \
              nanoloop-frontend-ci)
            if [ "${status}" = "healthy" ]; then
              docker exec nanoloop-frontend-ci python -c \
                "import os; assert os.getuid() != 0"
              readonly_root=$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' \
                nanoloop-frontend-ci)
              test "${readonly_root}" = "true"
              docker exec nanoloop-frontend-ci python -c \
                "import json,urllib.request; r=urllib.request.Request('http://api:8000/api/v1/health',headers={'X-API-Key':'ci_api_key_0123456789abcdef123456'}); p=json.load(urllib.request.urlopen(r,timeout=3)); assert p['status']=='success'"
              exit 0
            fi
            if [ "${status}" = "unhealthy" ]; then
              break
            fi
            sleep 2
          done
          docker logs nanoloop-frontend-ci
          exit 1

      - name: Clean up container smoke resources
        if: always()
        shell: bash
        run: |
          docker rm --force nanoloop-frontend-ci nanoloop-api-ci >/dev/null 2>&1 || true
          docker volume rm \
            nanoloop-ci-data nanoloop-ci-outputs nanoloop-ci-logs \
            nanoloop-ci-sources nanoloop-ci-index \
            >/dev/null 2>&1 || true
          docker network rm nanoloop-ci-network >/dev/null 2>&1 || true
